name: CI/CD — Subspace.money

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Test backend ─────────────────────────────────────────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: antigravity_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend-py
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend-py
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/antigravity_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret-key-minimum-32-chars
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  # ── 2. Build frontend ───────────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build Next.js
        working-directory: app
        run: npm run build

  # ── 3. Deploy to Vercel (frontend) ──────────────────────────────────────────
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: app
          vercel-args: "--prod"
